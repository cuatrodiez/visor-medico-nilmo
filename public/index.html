<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Médico Nilmo</title>
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdn.jsdelivr.net/npm/cornerstone-core@2.6.1/dist/cornerstone.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cornerstone-math@0.1.9/dist/cornerstoneMath.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cornerstone-tools@6.0.8/dist/cornerstoneTools.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dicom-parser@1.8.13/dist/dicomParser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cornerstone-wado-image-loader@4.1.5/dist/cornerstoneWADOImageLoader.min.js"></script>
</head>
<body class="dark-theme">
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Estudios Nilmo</h2>
                <p style="font-size: 0.8rem; color: gray;">Estado: <span id="status">Conectando...</span></p>
            </div>
            <div class="series-list" id="series-list">
                <div class="loading-text">Cargando estudios...</div>
            </div>
        </aside>

        <main class="workspace">
            <header class="toolbar">
                <button class="tool-btn active" data-tool="Wwwc">Contraste</button>
                <button class="tool-btn" data-tool="Zoom">Zoom</button>
                <button class="tool-btn" data-tool="Pan">Mover</button>
                <button class="tool-btn" data-tool="Length">Regla</button>
            </header>
            <div class="viewport-wrapper">
                <div id="dicom-viewport"></div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
