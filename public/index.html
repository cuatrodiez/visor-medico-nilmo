<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilmo DICOM Viewer</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            font-family: sans-serif;
            user-select: none;
        }

        #dicomImage {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            /* Cursor adjustments could be handled by cornerstone optionally, let's keep it visible */
        }

        #ui-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000, -1px -1px 2px #000;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            font-size: 24px;
            text-align: center;
        }
    </style>

    <!-- dicomParser -->
    <script src="https://cdn.jsdelivr.net/npm/dicom-parser@1.8.21/dist/dicomParser.min.js"></script>

    <!-- cornerstone-core -->
    <script src="https://cdn.jsdelivr.net/npm/cornerstone-core@2.6.1/dist/cornerstone.min.js"></script>

    <!-- cornerstone-math -->
    <script src="https://cdn.jsdelivr.net/npm/cornerstone-math@0.1.10/dist/cornerstoneMath.min.js"></script>

    <!-- cornerstone-tools -->
    <script src="https://cdn.jsdelivr.net/npm/cornerstone-tools@6.0.8/dist/cornerstoneTools.min.js"></script>

    <!-- cornerstone-wado-image-loader -->
    <script
        src="https://cdn.jsdelivr.net/npm/cornerstone-wado-image-loader@4.13.2/dist/cornerstoneWADOImageLoader.bundle.min.js"></script>
</head>

<body>
    <!-- Fullscreen black background medical theme -->
    <div id="loading" class="loading">Sincronizando estudios de Nilmo con Google Drive...<br><span
            style="font-size:16px; color:#aaa; margin-top:10px; display:inline-block;">Por favor, espera unos
            segundos.</span></div>

    <div id="ui-overlay" style="display:none;">
        <div style="font-size: 20px; font-weight: bold; margin-bottom: 5px;">Nilmo Viewer</div>
        <div style="margin-bottom: 10px;">
            <select id="series-selector"
                style="pointer-events: auto; background: rgba(0,0,0,0.6); color: #00ffcc; border: 1px solid #00ffcc; padding: 6px; font-size: 15px; border-radius: 4px; outline: none; cursor: pointer; backdrop-filter: blur(4px);">
            </select>
        </div>
        <div id="image-info" style="font-size: 16px; color: #00ffcc;">Imagen: 0 / 0</div>
        <div style="font-size: 13px; color: #ccc; margin-top: 10px;">
            Rueda: Navegar Stack<br>
            Click Izquierdo: Brillo/Contraste<br>
            Click Derecho: Zoom
        </div>
    </div>

    <div id="dicomImage" oncontextmenu="return false;"></div>

    <script>
        // Init cornerstone tools
        cornerstoneTools.external.cornerstone = cornerstone;
        cornerstoneTools.external.cornerstoneMath = cornerstoneMath;
        cornerstoneTools.init({
            mouseEnabled: true,
            touchEnabled: false,
            globalToolSyncEnabled: true,
            showSVGCursors: false
        });

        // Configure cornerstoneWADOImageLoader
        cornerstoneWADOImageLoader.external.cornerstone = cornerstone;
        cornerstoneWADOImageLoader.external.dicomParser = dicomParser;

        // Setup Web Workers with a dynamically created worker script to bypass CORS
        const workerScript = `
            importScripts('https://cdn.jsdelivr.net/npm/cornerstone-wado-image-loader@4.13.2/dist/cornerstoneWADOImageLoaderWebWorker.min.js');
        `;
        const workerBlob = new Blob([workerScript], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(workerBlob);

        cornerstoneWADOImageLoader.webWorkerManager.initialize({
            maxWebWorkers: navigator.hardwareConcurrency || 1,
            startWebWorkersOnDemand: true,
            webWorkerPath: workerUrl,
            taskConfiguration: {
                decodeTask: {
                    loadCodecsOnStartup: true,
                    initializeCodecsOnStartup: false,
                    codecsPath: 'https://cdn.jsdelivr.net/npm/cornerstone-wado-image-loader@4.13.2/dist/cornerstoneWADOImageLoaderCodecs.min.js',
                    usePDFJS: false,
                    strict: false,
                }
            }
        });

        const element = document.getElementById('dicomImage');
        cornerstone.enable(element);

        let currentStackData = null;
        let allSeriesData = {};

        function loadSeries(seriesName) {
            const fileIds = allSeriesData[seriesName];
            if (!fileIds || fileIds.length === 0) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').innerHTML = `Cargando <b>${seriesName}</b>...`;

            // Reset cornerstone state for the element properly
            try {
                cornerstone.disable(element);
            } catch (e) { }
            cornerstone.enable(element);

            const imageIds = fileIds.map(id => 'wadouri:' + window.location.origin + '/api/view/' + id);

            currentStackData = {
                currentImageIdIndex: 0,
                imageIds: imageIds
            };

            cornerstone.loadAndCacheImage(imageIds[0]).then(function (image) {
                document.getElementById('loading').style.display = 'none';
                cornerstone.displayImage(element, image);

                cornerstoneTools.addStackStateManager(element, ['stack']);
                cornerstoneTools.addToolState(element, 'stack', currentStackData);

                const WwwcTool = cornerstoneTools.WwwcTool;
                const ZoomTool = cornerstoneTools.ZoomTool;
                const StackScrollMouseWheelTool = cornerstoneTools.StackScrollMouseWheelTool;

                cornerstoneTools.addTool(WwwcTool);
                cornerstoneTools.addTool(ZoomTool);
                cornerstoneTools.addTool(StackScrollMouseWheelTool);

                cornerstoneTools.setToolActive('Wwwc', { mouseButtonMask: 1 });
                cornerstoneTools.setToolActive('Zoom', { mouseButtonMask: 2 });
                cornerstoneTools.setToolActive('StackScrollMouseWheel', {});

                updateImageInfo(1, imageIds.length);

                element.addEventListener('cornerstoneimagerendered', function () {
                    const toolState = cornerstoneTools.getToolState(element, 'stack');
                    if (toolState && toolState.data && toolState.data.length > 0) {
                        const currentStack = toolState.data[0];
                        updateImageInfo(currentStack.currentImageIdIndex + 1, currentStack.imageIds.length);
                    }
                });

            }).catch(function (err) {
                console.error('Error cargando la primera imagen de ' + seriesName + ':', err);
                document.getElementById('loading').style.display = 'block';
                document.getElementById('loading').innerText = 'Error al cargar imagen inicial de ' + seriesName + '.';
            });
        }

        fetch('/api/dicom-list')
            .then(res => res.json())
            .then(data => {
                if (!data || Object.keys(data).length === 0) {
                    document.getElementById('loading').innerHTML = 'No se encontraron imágenes DICOM en la carpeta especificada.';
                    return;
                }

                allSeriesData = data;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('ui-overlay').style.display = 'block';

                const selector = document.getElementById('series-selector');
                selector.innerHTML = '';

                for (const seriesName in allSeriesData) {
                    const option = document.createElement('option');
                    option.value = seriesName;
                    option.innerText = seriesName + ' (' + allSeriesData[seriesName].length + ' imgs)';
                    selector.appendChild(option);
                }

                selector.addEventListener('change', function (e) {
                    loadSeries(e.target.value);
                });

                // Cargar la primera serie por defecto
                const firstSeries = Object.keys(allSeriesData)[0];
                if (firstSeries) {
                    loadSeries(firstSeries);
                }
            })
            .catch(err => {
                console.error('Error fetching /api/dicom-list:', err);
                document.getElementById('loading').innerText = 'Error de conexión con el servidor (/api/dicom-list).';
            });

        function updateImageInfo(current, total) {
            document.getElementById('image-info').innerText = 'Imagen: ' + current + ' / ' + total;
        }

        // Handle window resize dynamically
        window.addEventListener('resize', function () {
            cornerstone.resize(element);
        });
    </script>
</body>

</html>
