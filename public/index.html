<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor DICOM - Nilmo</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/cornerstone-core@2.6.1/dist/cornerstone.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cornerstone-math@0.1.9/dist/cornerstoneMath.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cornerstone-tools@6.0.8/dist/cornerstoneTools.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dicom-parser@1.8.13/dist/dicomParser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cornerstone-wado-image-loader@4.1.5/dist/cornerstoneWADOImageLoader.min.js"></script>
</head>
<body class="dark-theme">
    <div id="toolbar" class="toolbar">
        <button id="prevBtn" class="tool-btn" disabled>Anterior</button>
        <div id="imageCounter" class="stack-controls">0 / 0</div>
        <button id="nextBtn" class="tool-btn" disabled>Siguiente</button>
        <button id="playBtn" class="tool-btn" disabled>Auto-Play</button>
    </div>
    <div class="viewport-wrapper">
        <div id="loading" class="loading-text">
            <div class="spinner"></div>
            <span id="loadingText">Escaneando estudios de Nilmo...</span>
        </div>
        <div id="dicomImage" class="viewport" oncontextmenu="return false"></div>
    </div>
    <script>
        cornerstoneWADOImageLoader.external.cornerstone = cornerstone;
        cornerstoneWADOImageLoader.external.dicomParser = dicomParser;
        cornerstoneWADOImageLoader.webWorkerManager.initialize({
            maxWebWorkers: navigator.hardwareConcurrency || 1,
            startWebWorkersOnDemand: true,
            taskConfiguration: { decodeTask: { initializeCodecsOnStartup: false, usePDFJS: false } }
        });

        let dicomFiles = [];
        let currentIndex = 0;
        const element = document.getElementById('dicomImage');

        async function initVisor() {
            cornerstone.enable(element);
            try {
                const res = await fetch('/api/dicom-files');
                const data = await res.json();
                if (data.success && data.files.length > 0) {
                    dicomFiles = data.files.map(f => `wadouri:${window.location.origin}/api/dicom-file/${f.id}`);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('prevBtn').disabled = false;
                    document.getElementById('nextBtn').disabled = false;
                    document.getElementById('playBtn').disabled = false;
                    renderImage(0);
                }
            } catch (err) {
                document.getElementById('loadingText').innerText = "Error al conectar con el servidor.";
            }
        }

        async function renderImage(index) {
            if (index < 0 || index >= dicomFiles.length) return;
            currentIndex = index;
            document.getElementById('imageCounter').innerText = `${currentIndex + 1} / ${dicomFiles.length}`;
            const image = await cornerstone.loadAndCacheImage(dicomFiles[currentIndex]);
            cornerstone.displayImage(element, image);
        }

        document.getElementById('nextBtn').onclick = () => renderImage(currentIndex + 1);
        document.getElementById('prevBtn').onclick = () => renderImage(currentIndex - 1);
        window.onload = initVisor;
    </script>
</body>
</html>
